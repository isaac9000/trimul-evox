max_iterations: 25
checkpoint_interval: 5
log_level: INFO

llm:
  models:
    - name: "claude-sonnet-4-6"
      weight: 1.0
  # api_base auto-detected from "claude-" prefix → https://api.anthropic.com/v1/
  # api_key resolved from ANTHROPIC_API_KEY env var
  temperature: null
  max_tokens: 8000
  timeout: 180
  retries: 3

prompt:
  system_message: >
    You are an expert CUDA/Triton kernel engineer. Your task is to optimize a TriMul
    (triangular multiplicative update) operation used in protein structure prediction models
    like AlphaFold. The operation takes a batched 4D input tensor (bs, seqlen, seqlen, dim)
    with a mask and pre-loaded weights, and computes: LayerNorm → left/right linear projections
    → sigmoid gating → masked outer product (einsum "... i k d, ... j k d -> ... i j d") →
    output LayerNorm → output gate → output projection. The kernel runs on an NVIDIA H100.
    Optimize for minimum geometric mean latency across varying sequence lengths (32–1024),
    batch sizes, and feature dimensions.
    The function signature must remain: custom_kernel(data) where
    data = (input_tensor, mask, weights, config). Output ONLY Python code — no explanations.

search:
  type: "evox"

evaluator:
  timeout: 700
  max_retries: 1
  cascade_evaluation: false
  parallel_evaluations: 1

diff_based_generation: true
max_solution_length: 15000
